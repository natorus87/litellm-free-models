apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-slave-1
  namespace: litellm-free-models
  labels:
    app.kubernetes.io/name: litellm-free-models
    app.kubernetes.io/component: slave
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm-slave-1
  template:
    metadata:
      labels:
        app: litellm-slave-1
        app.kubernetes.io/name: litellm-free-models
        app.kubernetes.io/component: slave
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: litellm-slave
          image: ghcr.io/berriai/litellm:main-v1.83.14-stable
          imagePullPolicy: IfNotPresent
          args:
            - "--config"
            - "/etc/litellm/config.yaml"
            - "--port"
            - "4000"
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          envFrom:
            - secretRef:
                name: litellm-slave1-secrets
          env:
            # Redis cache (shared with master + slave2)
            - name: REDIS_HOST
              value: "litellm-redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-redis-secret
                  key: redis-password
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      volumes:
        - name: config
          configMap:
            name: litellm-slave-config
            items:
              - key: config.yaml
                path: config.yaml
---
