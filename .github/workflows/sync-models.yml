# =============================================================================
# Sync Free Models – weekly PR pipeline
# =============================================================================
# Queries the provider catalogs, applies detected additions via
# `find-shared-models.py --apply` to config.template.yaml, regenerates
# config.yaml + multi-instance configs + docs matrix, and opens a PR.
#
# - Runs ONLY with provider keys from GitHub Secrets (use separate,
#   least-privilege free-tier keys just for the read-only catalog queries!).
#   Without keys, the run fails loudly instead of silently producing an
#   incomplete report.
# - No auto-merge: model changes affect routing/fallbacks and need a
#   human look.
# - Conservative about removals: --apply only adds / updates costs;
#   model REMOVALS stay deliberately manual (catalogs flap week to
#   week, cf. the gemma-3-12b-it history).
# =============================================================================
name: Sync Free Models (weekly PR)

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: sync provider catalogs & open PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build .env from GitHub Secrets
        env:
          OPENROUTER_API_KEY: ${{ secrets.SYNC_OPENROUTER_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.SYNC_CEREBRAS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.SYNC_GROQ_API_KEY }}
          CLOUDFLARE_API_KEY: ${{ secrets.SYNC_CLOUDFLARE_API_KEY }}
          CLOUDFLARE_API_BASE: ${{ secrets.SYNC_CLOUDFLARE_API_BASE }}
          GEMINI_API_KEY: ${{ secrets.SYNC_GEMINI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.SYNC_NVIDIA_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.SYNC_MISTRAL_API_KEY }}
          COHERE_API_KEY: ${{ secrets.SYNC_COHERE_API_KEY }}
          MODELS_GITHUB_TOKEN: ${{ secrets.SYNC_GITHUB_MODELS_TOKEN }}
          OPENCODE_ZEN_API_KEY: ${{ secrets.SYNC_OPENCODE_ZEN_API_KEY }}
          LLM7IO_API_KEY: ${{ secrets.SYNC_LLM7IO_API_KEY }}
          HF_TOKEN: ${{ secrets.SYNC_HF_TOKEN }}
        run: |
          {
            echo "LITELLM_MASTER_KEY=sk-ci-sync"
            echo "REDIS_HOST=redis"
            echo "REDIS_PASSWORD=ci-sync-dummy"
            echo "POSTGRES_PASSWORD=ci-sync-dummy"
            [ -n "$OPENROUTER_API_KEY" ]   && echo "OPENROUTER_API_KEY=$OPENROUTER_API_KEY"
            [ -n "$CEREBRAS_API_KEY" ]     && echo "CEREBRAS_API_KEY=$CEREBRAS_API_KEY"
            [ -n "$GROQ_API_KEY" ]         && echo "GROQ_API_KEY=$GROQ_API_KEY"
            [ -n "$CLOUDFLARE_API_KEY" ]   && echo "CLOUDFLARE_API_KEY=$CLOUDFLARE_API_KEY"
            [ -n "$CLOUDFLARE_API_BASE" ]  && echo "CLOUDFLARE_API_BASE=$CLOUDFLARE_API_BASE"
            [ -n "$GEMINI_API_KEY" ]       && echo "GEMINI_API_KEY=$GEMINI_API_KEY"
            [ -n "$NVIDIA_API_KEY" ]       && echo "NVIDIA_API_KEY=$NVIDIA_API_KEY"
            [ -n "$MISTRAL_API_KEY" ]      && echo "MISTRAL_API_KEY=$MISTRAL_API_KEY"
            [ -n "$COHERE_API_KEY" ]       && echo "COHERE_API_KEY=$COHERE_API_KEY"
            [ -n "$MODELS_GITHUB_TOKEN" ]  && echo "GITHUB_TOKEN=$MODELS_GITHUB_TOKEN"
            [ -n "$OPENCODE_ZEN_API_KEY" ] && echo "OPENCODE_ZEN_API_KEY=$OPENCODE_ZEN_API_KEY"
            [ -n "$LLM7IO_API_KEY" ]       && echo "LLM7IO_API_KEY=$LLM7IO_API_KEY"
            [ -n "$HF_TOKEN" ]             && echo "HF_TOKEN=$HF_TOKEN"
            true
          } > .env
          # llm7io/huggingface/ovhcloud also work without a key – but
          # without any provider secrets at all, the report is
          # systematically incomplete. Fail loudly instead (V11).
          key_count=$(grep -cE '_API_KEY=|_TOKEN=' .env || true)
          if [ "$key_count" -lt 3 ]; then
            echo "::error::Too few provider keys configured as SYNC_* secrets ($key_count found)."
            echo "::error::Without keys, the catalog sync is systematically incomplete – create the secrets (see workflow header)."
            exit 1
          fi
          echo "$key_count provider keys configured."

      - name: Run catalog sync (--apply + regen)
        run: |
          python3 find-shared-models.py --apply --regen-multi-instance

      - name: Regenerate docs matrix
        run: python3 find-shared-models.py --write-docs

      # ── Gates: only a green run reaches the reviewer ──────────────────────
      - name: Gate – lint
        run: |
          pip install ruff
          ruff check .

      - name: Gate – tests (inkl. Config-Invarianten)
        run: make test

      - name: Gate – render smoke
        run: |
          python3 render-config.py --dry-run
          python3 render-config.py --no-redis --output config.check.yaml

      - name: Gate – manifest validation
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | sudo tar xz -C /usr/local/bin kubeconform
          find k8s multi-instance/k8s -name '*.yaml' \
            ! -name '*.template' ! -name 'kustomization.yaml' -print0 \
            | xargs -0 kubeconform -strict -summary

      - name: Prepare PR body
        run: |
          {
            echo "Weekly provider catalog sync (\`find-shared-models.py --apply\`)."
            echo
            echo "- ✅ Gates: ruff, unit/invariant tests, render smoke test, kubeconform"
            echo "- ⚠️ No auto-merge – please review routing/fallback changes."
            echo "- ℹ️ \`--apply\` only adds / updates costs. Model removals"
            echo "  stay manual (flapping protection)."
            echo
            echo "<details><summary>providers-overlap.txt (truncated)</summary>"
            echo
            echo '```'
            head -c 60000 providers-overlap.txt || echo "(no report generated)"
            echo '```'
            echo "</details>"
          } > /tmp/pr-body.md

      # Don't include generated/local files in the PR
      - name: Clean workspace for PR
        run: |
          rm -f .env config.check.yaml providers-overlap.txt
          rm -f config.yaml.bak.* multi-instance/master/config.yaml.bak.*
          git checkout -- .github/ 2>/dev/null || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: sync/free-models
          delete-branch: true
          commit-message: "feat(sync): update free-model catalog (weekly sync)"
          title: "Weekly free-model catalog sync"
          body-path: /tmp/pr-body.md
          labels: |
            dependencies
            models-sync
          # Template + docs ONLY: config.yaml and the multi-instance outputs
          # are generated, gitignored, and contain substituted API keys.
          add-paths: |
            config.template.yaml
            AGENTS.md
            README.md
