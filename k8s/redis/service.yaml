apiVersion: v1
kind: Service
metadata:
  name: litellm-redis
  namespace: litellm-free-models
  labels:
    app.kubernetes.io/name: litellm-free-models
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  selector:
    app: litellm-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
