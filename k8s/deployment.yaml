apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-proxy
  namespace: litellm-free-models
  labels:
    app.kubernetes.io/name: litellm-free-models
    app.kubernetes.io/component: proxy
spec:
  # Bei replicas > 1 teilen sich die Pods Auth- und Response-Cache über Redis
  # (enable_redis_auth_cache). Eine podAntiAffinity lohnt erst dann wieder.
  replicas: 1
  selector:
    matchLabels:
      app: litellm-proxy
  template:
    metadata:
      labels:
        app: litellm-proxy
        app.kubernetes.io/name: litellm-free-models
        app.kubernetes.io/component: proxy
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: litellm-proxy
          # Gepinnte Version statt wanderndem main-latest (Reproduzierbarkeit;
          # main-latest + IfNotPresent liesse jeden Node auf anderem Stand
          # laufen). Update bewusst via Tag-Bump.
          image: ghcr.io/berriai/litellm:main-v1.83.14-stable
          imagePullPolicy: IfNotPresent
          args:
            - "--config"
            - "/etc/litellm/config.yaml"
            - "--port"
            - "4000"
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          envFrom:
            # Provider-API-Keys; von `make k8s-secret` aus .env erzeugt
            # (explizite Key-Allowlist, enthaelt KEINE REDIS_*/POSTGRES_*).
            - secretRef:
                name: litellm-secrets
          env:
            # Redis cache (resolved by LiteLLM via os.environ/REDIS_* in
            # config.yaml). REDIS_PASSWORD kommt ausschliesslich aus
            # litellm-redis-secret (Single Source; `make k8s-secret`
            # erzeugt es aus .env – Rotation: .env aendern + make k8s-secret
            # + make k8s-restart).
            - name: REDIS_HOST
              value: "litellm-redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-redis-secret
                  key: redis-password
            # Postgres für Key-Management & Spend-Tracking. $(VAR)-Expansion
            # funktioniert in env-values (anders als in Probe-Kommandos).
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-postgres-secret
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://litellm:$(POSTGRES_PASSWORD)@postgres:5432/litellm"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      volumes:
        - name: config
          configMap:
            name: litellm-config
            items:
              - key: config.yaml
                path: config.yaml
