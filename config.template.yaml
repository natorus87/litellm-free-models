# =============================================================================
# Router Settings  –  Load Balancing, Fallback & Cooldown
# =============================================================================
router_settings:
  # usage-based-routing-v2 routet auf Deployments, die noch tpm/rpm-Budget
  # haben (Werte aus litellm_params.tpm/rpm der model_list) – statt wie
  # simple-shuffle ein rpm:1-Deployment (OpenRouter) genauso oft zu treffen
  # wie ein rpm:40-Deployment (LLM7/NVIDIA). Mit Redis (Block unten) wird
  # der Verbrauch instanzuebergreifend getrackt (Master + Slaves + Replicas)
  # inkl. geteilter Cooldowns; ohne Redis faellt LiteLLM auf
  # In-Memory-Tracking pro Instanz zurueck.
  routing_strategy: usage-based-routing-v2
  # BEGIN REDIS ROUTER (von render-config.py entfernt, wenn REDIS_HOST fehlt)
  redis_host: os.environ/REDIS_HOST
  redis_port: os.environ/REDIS_PORT
  redis_password: os.environ/REDIS_PASSWORD
  # END REDIS ROUTER
  num_retries: 2
  retry_after: 5
  allowed_fails: 3
  cooldown_time: 30

  fallbacks:
    - {"gpt-oss-120b":              ["gpt-oss-20b", "llama-3.3-70b-instruct", "nemotron-3-120b", "mistral-large"]}
    - {"llama-3.3-70b-instruct":    ["llama-3.1-8b", "mistral-large", "gpt-oss-20b", "gemma-4-26b-a4b-it"]}
