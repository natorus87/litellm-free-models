apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: litellm-free-models

resources:
  - namespace.yaml
  # Shared Redis base (same manifests as the single-instance setup –
  # edit in k8s/redis/, never copy). The litellm-redis-secret is created
  # via `make k8s-secret` at the repo root.
  - ../../k8s/redis
  - master/configmap.yaml
  - master/deployment.yaml
  - master/service.yaml
  - slave/configmap.yaml
  - slave/deployment.yaml
  - slave/service.yaml
