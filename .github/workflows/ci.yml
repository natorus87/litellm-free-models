name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ruff (optional linter)
        run: |
          pip install ruff || true

      - name: Run ruff (best-effort)
        run: |
          if python -c "import ruff" 2>/dev/null; then
            echo "Running ruff..."
            ruff check . || echo "::warning::ruff reported issues"
          else
            echo "ruff not installed — skipping lint step"
          fi

      - name: Run tests
        run: make test

      - name: Smoke-test render-config (dry-run)
        run: python3 render-config.py --dry-run
