# =============================================================================
# LiteLLM Global Settings
# =============================================================================
litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 120
  num_retries: 2

  # BEGIN REDIS CACHE
  # ─── Redis-Cache ──────────────────────────────────────────────────────────
  # Shared cache between master + all slaves. Reduces latency and rate-limit
  # pressure on upstream providers (identical prompts get served from cache).
  #
  # ⚠️ SEMANTIK-HINWEIS (bewusste Entscheidung, siehe README "Response-Cache"):
  # Identische Requests (model, messages, temperature, ... werden gehasht)
  # liefern innerhalb der TTL die byte-identische gecachte Antwort – auch bei
  # temperature > 0. Opt-out pro Request via LiteLLM-Extension:
  #   {"cache": {"no-cache": true}}  bzw. Header  Cache-Control: no-cache
  # Deshalb ist die TTL bewusst kurz (5 min) gewaehlt.
  #
  # The `os.environ/...` syntax is resolved by LiteLLM at *runtime* from the
  # process environment, so the same rendered config.yaml works in Docker
  # Compose (REDIS_HOST=redis) and in Kubernetes (REDIS_HOST=litellm-redis).
  #
  # enable_redis_auth_cache: virtual-key lookups are also mirrored to Redis,
  # so multi-replica/multi-instance deployments share auth state and do
  # not hammer Postgres on every request.
  #
  # Der gesamte Block wird von render-config.py entfernt, wenn REDIS_HOST
  # in .env fehlt/leer ist (oder mit --no-redis gerendert wird) – der Proxy
  # laeuft dann ohne Cache, statt gegen ein unerreichbares Redis zu laufen.
  cache: true
  enable_redis_auth_cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
    password: os.environ/REDIS_PASSWORD
    namespace: "litellm.cache"
    # Response-Cache: 5 min in Redis
    ttl: 300
    # In-Memory-Tier: 1 min
    default_in_memory_ttl: 60
    max_connections: 50
    # Nur Chat-Call-Types: alle Deployments sind mode: chat
    # (aembedding/atranscription waeren tote Eintraege).
    supported_call_types:
      - "acompletion"
      - "atext_completion"
  # END REDIS CACHE

# =============================================================================
# General Server Settings
# =============================================================================
general_settings:
  master_key: {{LITELLM_MASTER_KEY}}
  allow_models_on_dynamic_config: false
  # 5 min TTL for virtual-key lookups (in-memory + Redis via enable_redis_auth_cache)
  user_api_key_cache_ttl: 300

