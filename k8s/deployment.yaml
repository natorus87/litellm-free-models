apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-proxy
  namespace: litellm-free-models
  labels:
    app.kubernetes.io/name: litellm-free-models
    app.kubernetes.io/component: proxy
spec:
  # With replicas > 1, pods share the auth and response cache via Redis
  # (enable_redis_auth_cache). A podAntiAffinity only pays off from then on.
  replicas: 1
  selector:
    matchLabels:
      app: litellm-proxy
  template:
    metadata:
      labels:
        app: litellm-proxy
        app.kubernetes.io/name: litellm-free-models
        app.kubernetes.io/component: proxy
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: litellm-proxy
          # Pinned version instead of a moving main-latest (reproducibility;
          # main-latest + IfNotPresent would let every node run a different
          # version). Updates happen deliberately via a tag bump.
          image: ghcr.io/berriai/litellm:v1.92.0
          imagePullPolicy: IfNotPresent
          args:
            - "--config"
            - "/etc/litellm/config.yaml"
            - "--port"
            - "4000"
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          envFrom:
            # Provider API keys; created by `make k8s-secret` from .env
            # (explicit key allowlist, contains NO REDIS_*/POSTGRES_*).
            - secretRef:
                name: litellm-secrets
          env:
            # Redis cache (resolved by LiteLLM via os.environ/REDIS_* in
            # config.yaml). REDIS_PASSWORD comes exclusively from
            # litellm-redis-secret (single source; `make k8s-secret`
            # creates it from .env – rotation: edit .env + make k8s-secret
            # + make k8s-restart).
            - name: REDIS_HOST
              value: "litellm-redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-redis-secret
                  key: redis-password
            # Postgres for key management & spend tracking. $(VAR) expansion
            # works in env values (unlike in probe commands).
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-postgres-secret
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://litellm:$(POSTGRES_PASSWORD)@postgres:5432/litellm"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      volumes:
        - name: config
          configMap:
            name: litellm-config
            items:
              - key: config.yaml
                path: config.yaml
