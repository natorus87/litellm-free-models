apiVersion: v1
kind: Service
metadata:
  name: litellm-proxy
  namespace: litellm-free-models
  labels:
    app.kubernetes.io/name: litellm-free-models
    app.kubernetes.io/component: proxy
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "4000"
spec:
  type: ClusterIP
  selector:
    app: litellm-proxy
  ports:
    - name: http
      port: 4000
      targetPort: 4000
      protocol: TCP
