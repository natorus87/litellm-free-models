# =============================================================================
# NetworkPolicies – Redis & Postgres reachable only from LiteLLM pods
# =============================================================================
# Without these policies, any pod in the namespace can talk directly to
# Redis (password-protected only) and Postgres. The LiteLLM pods
# themselves stay unrestricted (they need egress to the provider APIs
# and ingress from the service/ingress controller).
#
# Requires a CNI with NetworkPolicy support (Calico, Cilium, …).
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-only-from-litellm
  namespace: litellm-free-models
  labels:
    app.kubernetes.io/name: litellm-free-models
    app.kubernetes.io/component: cache
spec:
  podSelector:
    matchLabels:
      app: litellm-redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values:
                  - proxy
                  - master
                  - slave
      ports:
        - protocol: TCP
          port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-only-from-litellm
  namespace: litellm-free-models
  labels:
    app.kubernetes.io/name: litellm-free-models
    app.kubernetes.io/component: database
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values:
                  - proxy
                  - master
                  - slave
      ports:
        - protocol: TCP
          port: 5432
