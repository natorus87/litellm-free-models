version: "3.9"

# =============================================================================
# Multi-Instance LiteLLM Setup
# =============================================================================
# 1 Master + 2 Slaves, each with their OWN set of provider API keys.
#
# The master:
#   - Has direct provider deployments (using master's own keys)
#   - PLUS additional deployments that route through each slave
#   - Uses simple-shuffle across ALL deployments (direct + slave)
#
# Each slave:
#   - Runs the SAME base config.yaml (direct provider connections)
#   - Uses its OWN API keys (different accounts = different rate limits)
#   - Listens on a different host port (4001, 4002)
#
# Prerequisites:
#   1. python3 generate-config.py        # creates master/config.yaml
#   2. cp master/.env.example master/.env   # fill in master's keys
#   3. cp slave1/.env.example slave1/.env   # fill in slave1's keys
#   4. cp slave2/.env.example slave2/.env   # fill in slave2's keys
#   5. docker compose up -d
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: litellm-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-litellm}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-litellm}
      - POSTGRES_DB=${POSTGRES_DB:-litellm}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-litellm} -d ${POSTGRES_DB:-litellm}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - litellm-multi
    restart: unless-stopped

  # ─── Master Instance ────────────────────────────────────────────────────────
  master:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-master
    ports:
      - "4000:4000"  # Clients call the master on port 4000
    env_file: ./master/.env
    environment:
      # PostgreSQL Database URL for LiteLLM (key management, spend tracking, etc.)
      - DATABASE_URL=postgresql://${POSTGRES_USER:-litellm}:${POSTGRES_PASSWORD:-litellm}@postgres:5432/${POSTGRES_DB:-litellm}
    volumes:
      - ./master/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - litellm-multi
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Slave 1 Instance ──────────────────────────────────────────────────────
  slave1:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-slave1
    ports:
      - "4001:4000"  # Slave 1 on host port 4001
    env_file: ./slave1/.env
    environment:
      # PostgreSQL Database URL for LiteLLM (key management, spend tracking, etc.)
      - DATABASE_URL=postgresql://${POSTGRES_USER:-litellm}:${POSTGRES_PASSWORD:-litellm}@postgres:5432/${POSTGRES_DB:-litellm}
    volumes:
      # Uses the SAME base config.yaml as the standalone setup
      - ../config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - litellm-multi
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Slave 2 Instance ──────────────────────────────────────────────────────
  slave2:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-slave2
    ports:
      - "4002:4000"  # Slave 2 on host port 4002
    env_file: ./slave2/.env
    environment:
      # PostgreSQL Database URL for LiteLLM (key management, spend tracking, etc.)
      - DATABASE_URL=postgresql://${POSTGRES_USER:-litellm}:${POSTGRES_PASSWORD:-litellm}@postgres:5432/${POSTGRES_DB:-litellm}
    volumes:
      # Uses the SAME base config.yaml as the standalone setup
      - ../config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - litellm-multi
    depends_on:
      postgres:
        condition: service_healthy

networks:
  litellm-multi:
    driver: bridge

volumes:
  postgres-data:
    driver: local
