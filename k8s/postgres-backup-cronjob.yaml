# =============================================================================
# Postgres – Nightly Backup (pg_dump) CronJob
# =============================================================================
# Postgres is the stack's only persistent state (virtual keys, spend
# tracking, team/user mappings). A broken PVC without a backup means:
# all issued API keys are gone.
#
# This CronJob writes a pg_dump (custom format) daily at 03:30 UTC into
# a separate PVC and keeps the last 7 dumps.
#
# Restore (see also the README "Backup & Restore" section):
#   kubectl -n litellm-free-models run pg-restore --rm -it --restart=Never \
#     --image=postgres:16-alpine --overrides='...' -- \
#     pg_restore -h postgres -U litellm -d litellm --clean /backups/<dump>
# =============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: litellm-free-models
  labels:
    app.kubernetes.io/name: litellm-free-models
    app.kubernetes.io/component: database-backup
spec:
  schedule: "30 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: postgres-backup
            app.kubernetes.io/name: litellm-free-models
            # component named like "proxy" so the postgres-only-from-litellm
            # NetworkPolicy allows access to Postgres
            app.kubernetes.io/component: proxy
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
            runAsGroup: 70
            fsGroup: 70
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: pg-dump
              image: postgres:16-alpine
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: litellm-postgres-secret
                      key: postgres-password
              command:
                - "sh"
                - "-c"
                - |
                  set -eu
                  ts=$(date +%Y%m%d-%H%M%S)
                  pg_dump -h postgres -U litellm -d litellm -F c \
                    -f "/backups/litellm-${ts}.dump"
                  echo "Backup written: litellm-${ts}.dump"
                  # Keep only the last 7 dumps
                  ls -1t /backups/litellm-*.dump | tail -n +8 | xargs -r rm -f --
                  echo "Existing backups:"; ls -lh /backups/
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: postgres-backups
