# =============================================================================
# LiteLLM Proxy Configuration – Free Models Only (TEMPLATE)
# =============================================================================
# DIESE DATEI IST DIE SINGLE SOURCE OF TRUTH.
#
# Sie wird zur Laufzeit via `render-config.py` (im Repo-Root) in
# `config.yaml` ueberfuehrt. Direkte Edits an `config.yaml` werden beim
# naechsten Render ueberschrieben.
#
# Platzhalter-Syntax: {{ENV_VAR}} wird durch den Wert der entsprechenden
# Variable in `.env` ersetzt. Fehlt die Variable, wird der Block dieses
# Providers komplett aus `config.yaml` entfernt (ausser bei OVHcloud, das
# anonymen Free-Tier ohne Key unterstuetzt -- dort wird "" eingesetzt).
#
# Aggregates 24+ open-source & commercial LLM models across 12 free
# providers (OpenRouter, Cerebras, Groq, Cloudflare Workers AI, Google AI
# Studio, NVIDIA NIM, Mistral La Plateforme, Cohere, GitHub Models,
# OpenCode Zen, LLM7.io, HuggingFace Inference API, OVHcloud)
# into a single OpenAI-compatible endpoint with automatic load balancing,
# fallback, and rate-limit cooldown.
#
# Client requests use the `model_name` (e.g. "gpt-oss-120b") and LiteLLM
# routes to one of the backends behind it.
#
# Docs:  https://docs.litellm.ai/docs/proxy/configs
#        https://docs.litellm.ai/docs/proxy/reliability
# =============================================================================

