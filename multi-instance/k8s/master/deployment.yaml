apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-master
  namespace: litellm-free-models
  labels:
    app.kubernetes.io/name: litellm-free-models
    app.kubernetes.io/component: master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm-master
  template:
    metadata:
      labels:
        app: litellm-master
        app.kubernetes.io/name: litellm-free-models
        app.kubernetes.io/component: master
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
    spec:
      containers:
        - name: litellm-master
          image: ghcr.io/berriai/litellm:main-latest
          imagePullPolicy: IfNotPresent
          args:
            - "--config"
            - "/etc/litellm/config.yaml"
            - "--port"
            - "4000"
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          envFrom:
            - secretRef:
                name: litellm-master-secrets
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      volumes:
        - name: config
          configMap:
            name: litellm-master-config
            items:
              - key: config.yaml
                path: config.yaml
