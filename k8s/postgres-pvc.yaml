apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgdata
  namespace: litellm-free-models
  labels:
    app.kubernetes.io/name: litellm-free-models
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
