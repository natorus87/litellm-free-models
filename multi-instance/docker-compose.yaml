# =============================================================================
# Multi-Instance LiteLLM Setup
# =============================================================================
# 1 Master + 2 Slaves, each with their OWN set of provider API keys.
#
# The master:
#   - Has direct provider deployments (using master's own keys)
#   - PLUS additional deployments that route through each slave
#   - Uses simple-shuffle across ALL deployments (direct + slave)
#
# Each slave:
#   - Runs the SAME base config.yaml (direct provider connections)
#   - Uses its OWN API keys (different accounts = different rate limits)
#   - Listens on a different host port (4001, 4002)
#
# Prerequisites:
#   1. python3 generate-config.py        # creates master/config.yaml
#   2. cp .env.example .env                 # shared infra (Redis/Postgres passwords)
#   3. cp master/.env.example master/.env   # fill in master's keys
#   4. cp slave1/.env.example slave1/.env   # fill in slave1's keys
#   5. cp slave2/.env.example slave2/.env   # fill in slave2's keys
#   6. docker compose up -d
#
# NOTE on .env files: Docker Compose interpolates ${VAR} expressions in this
# file ONLY from the shell environment or the project-level .env (step 2) –
# NEVER from the per-service env_file entries. Redis/Postgres passwords
# therefore live in ./.env; the per-instance .env files carry only the
# provider API keys.
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: litellm-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-litellm}
      # No default on purpose: set POSTGRES_PASSWORD in ./.env (see .env.example)
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in multi-instance/.env}
      - POSTGRES_DB=${POSTGRES_DB:-litellm}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-litellm} -d ${POSTGRES_DB:-litellm}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - litellm-multi
    restart: unless-stopped

  # ─── Shared Redis Cache ────────────────────────────────────────────────────
  # Single Redis instance, shared by master + all slaves. Identical prompts
  # hit cache instead of upstream providers; virtual-key lookups are also
  # shared across replicas (see enable_redis_auth_cache in config.yaml).
  redis:
    image: redis:7-alpine
    container_name: litellm-redis
    # Kein Passwort-Default: REDIS_PASSWORD muss in ./.env gesetzt sein
    # (siehe .env.example). --save "" = reiner LRU-Cache ohne Persistenz.
    command:
      - "redis-server"
      - "--port"
      - "${REDIS_PORT:-6379}"
      - "--requirepass"
      - "${REDIS_PASSWORD:?REDIS_PASSWORD must be set in multi-instance/.env}"
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--save"
      - ""
    healthcheck:
      # -e: Exit-Code != 0 bei Error-Replies (z.B. NOAUTH)
      test: ["CMD", "redis-cli", "-p", "${REDIS_PORT:-6379}", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set in multi-instance/.env}", "-e", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - litellm-multi
    restart: unless-stopped

  # ─── Master Instance ────────────────────────────────────────────────────────
  master:
    image: ghcr.io/berriai/litellm:v1.92.0
    container_name: litellm-master
    ports:
      - "4000:4000"  # Clients call the master on port 4000
    env_file: ./master/.env
    environment:
      # PostgreSQL Database URL for LiteLLM (key management, spend tracking, etc.)
      - DATABASE_URL=postgresql://${POSTGRES_USER:-litellm}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in multi-instance/.env}@postgres:5432/${POSTGRES_DB:-litellm}
      # Redis cache (resolved by LiteLLM via os.environ/REDIS_* in config.yaml)
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set in multi-instance/.env}
    volumes:
      - ./master/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped
    healthcheck:
      # The litellm image has neither curl nor wget on PATH; python3 (part
      # of the image) via urllib is the only reliably available HTTP client.
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/readiness', timeout=5).status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - litellm-multi
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Slave 1 Instance ──────────────────────────────────────────────────────
  slave1:
    image: ghcr.io/berriai/litellm:v1.92.0
    container_name: litellm-slave1
    ports:
      - "4001:4000"  # Slave 1 on host port 4001
    env_file: ./slave1/.env
    environment:
      # PostgreSQL Database URL for LiteLLM (key management, spend tracking, etc.)
      - DATABASE_URL=postgresql://${POSTGRES_USER:-litellm}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in multi-instance/.env}@postgres:5432/${POSTGRES_DB:-litellm}
      # Redis cache (shared with master + slave2)
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set in multi-instance/.env}
    volumes:
      # Uses the SAME base config.yaml as the standalone setup
      - ../config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped
    healthcheck:
      # The litellm image has neither curl nor wget on PATH; python3 (part
      # of the image) via urllib is the only reliably available HTTP client.
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/readiness', timeout=5).status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - litellm-multi
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Slave 2 Instance ──────────────────────────────────────────────────────
  slave2:
    image: ghcr.io/berriai/litellm:v1.92.0
    container_name: litellm-slave2
    ports:
      - "4002:4000"  # Slave 2 on host port 4002
    env_file: ./slave2/.env
    environment:
      # PostgreSQL Database URL for LiteLLM (key management, spend tracking, etc.)
      - DATABASE_URL=postgresql://${POSTGRES_USER:-litellm}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in multi-instance/.env}@postgres:5432/${POSTGRES_DB:-litellm}
      # Redis cache (shared with master + slave1)
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set in multi-instance/.env}
    volumes:
      # Uses the SAME base config.yaml as the standalone setup
      - ../config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped
    healthcheck:
      # The litellm image has neither curl nor wget on PATH; python3 (part
      # of the image) via urllib is the only reliably available HTTP client.
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/readiness', timeout=5).status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - litellm-multi
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  litellm-multi:
    driver: bridge

volumes:
  postgres-data:
    driver: local
